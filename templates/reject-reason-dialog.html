<form class="dnd5e-calendar-reject-reason">
  <div class="form-group">
    <label>{{reasonLabel}}:</label>
    <textarea name="reason" rows="3"></textarea>
  </div>
  <div class="dialog-buttons">
    <button type="submit" class="save-btn">{{localize "DNDCAL.Config.Save"}}</button>
    <button type="button" class="cancel-btn">{{localize "DNDCAL.Config.Cancel"}}</button>
  </div>
</form>
