<div class="dnd5e-holiday-submit-dialog">
  <h2>{{localize "DNDCAL.Holidays.SubmitTitle"}}</h2>

  <p class="info-text">{{localize "DNDCAL.Holidays.SubmitInfo"}}</p>

  <div class="form-group">
    <label>{{localize "DNDCAL.Holidays.HolidayName"}} *</label>
    <input type="text" name="holidayName" placeholder="{{localize "DNDCAL.Holidays.HolidayNamePlaceholder"}}" required>
  </div>

  <div class="form-group">
    <label>{{localize "DNDCAL.Holidays.Date"}} *</label>
    <div class="date-inputs">
      <input type="number" name="day" value="{{day}}" min="1" max="31" placeholder="{{localize "DNDCAL.Holidays.Day"}}" required>
      <input type="number" name="month" value="{{month}}" min="0" max="11" placeholder="{{localize "DNDCAL.Holidays.Month"}}" required>
      <input type="number" name="year" value="{{year}}" placeholder="{{localize "DNDCAL.Holidays.Year"}}" required>
    </div>
  </div>

  <div class="form-group">
    <label>{{localize "DNDCAL.Holidays.Description"}}</label>
    <textarea class="description-input" rows="4" maxlength="400" placeholder="{{localize "DNDCAL.Holidays.DescriptionPlaceholder"}}"></textarea>
    <span class="char-count">{{maxChars}} {{localize "DNDCAL.Holidays.CharactersRemaining"}}</span>
  </div>

  <div class="form-actions">
    <button type="button" class="cancel-btn">{{localize "DNDCAL.Config.Cancel"}}</button>
    <button type="button" class="submit-btn">{{localize "DNDCAL.Holidays.SubmitForApproval"}}</button>
  </div>
</div>
